<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimation Tool | Hewitt Plumbing & Heating</title>
    <meta name="description" content="Get an instant estimate for your plumbing or heating project with our premium online estimator.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Using the same global variables as index.html -->
    <style>
        :root {
            --deep-black: #0a0a0a;
            --charcoal: #141414;
            --champagne: #c9a96e;
            --gold-light: #d4b87a;
            --ivory: #f8f6f1;
            --warm-white: #faf9f7;
            --cream: #f0ece4;
            --stone: #e5e0d8;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --transition-slow: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-medium: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-fast: all 0.2s ease-out;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ivory); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }
        
        /* Nav styles */
        .top-bar { background-color: var(--deep-black); color: var(--ivory); padding: 0.8rem 5%; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.05em; font-weight: 300; }
        .top-bar-contact { display: flex; gap: 2rem; }
        .top-bar-contact a { transition: var(--transition-fast); }
        .top-bar-contact a:hover { color: var(--champagne); }
        .divider { color: var(--text-secondary); margin: 0 0.5rem; }
        
        #navbar { padding: 1.5rem 5%; background: var(--ivory); border-bottom: 1px solid var(--stone); position: sticky; top: 0; z-index: 100; transition: var(--transition-medium); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-mark { width: 40px; height: 40px; background: var(--deep-black); color: var(--champagne); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; }
        .logo-text { display: flex; flex-direction: column; }
        .logo-text .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; line-height: 1; letter-spacing: 0.05em; text-transform: uppercase; }
        .logo-text .tagline { font-size: 0.7rem; font-weight: 400; color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }
        
        .nav-links { display: flex; list-style: none; gap: 2.5rem; align-items: center; }
        .nav-links li a { font-size: 0.85rem; font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; transition: var(--transition-fast); }
        .nav-links li a:hover { color: var(--champagne); }
        .nav-cta { border: 1px solid var(--deep-black); padding: 0.8rem 1.5rem; transition: var(--transition-medium) !important; }
        .nav-cta:hover { background: var(--deep-black); color: var(--champagne) !important; }
        .mobile-menu-btn { display: none; }
        @media (max-width: 992px) {
            .top-bar { flex-direction: column; gap: 0.5rem; text-align: center; }
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; background: none; border: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
        }
    </style>
    <link rel="stylesheet" href="assets/css/estimator.css">
</head>
<body>

    <div class="top-bar">
        <div>24/7 Emergency Service Available</div>
        <div class="top-bar-contact">
            <a href="tel:07540182837">07540 182 837</a>
            <span class="divider">|</span>
            <a href="mailto:khpah20@gmail.com">khpah20@gmail.com</a>
        </div>
    </div>

    <nav id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-mark"><span>HP</span></div>
                <div class="logo-text">
                    <span class="brand">Hewitt</span>
                    <span class="tagline">Plumbing & Heating</span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#areas">Areas</a></li>
                <li><a href="estimate.html" style="color: var(--champagne); font-weight: 500;">Estimate</a></li>
                <li><a href="index.html#reviews">Reviews</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact" class="nav-cta">Get a Quote</a></li>
            </ul>
        </div>
    </nav>

    <!-- ESTMATOR APP MOUNT -->
    <main id="estimatorApp" class="estimator-app"></main>

    <!-- HTML2PDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="assets/js/estimator.js"></script>
</body>
</html>
